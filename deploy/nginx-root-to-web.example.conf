# 生产环境示例：dnf1688.cloud
# 将本片段合并到站点 server { } 中，放在 location / 之前。
# 效果：访问 https://www.dnf1688.cloud/ → 302 到 /web/（浏览器地址栏为 /web/#/...）
#       https://www.dnf1688.cloud/admin/ 仍为管理后台，不受影响。

location = / {
    return 302 /web/;
}

# 若已有 location /，保持 try_files 回退到 index.html 即可，例如：
# location / {
#     root /path/to/web/dist;
#     try_files $uri $uri/ /index.html;
# }

# 四、你这台服务器的性能评级
# 中等偏上，满足 90% 门户 / 管理系统场景可支撑：
# 日活 5000~10000 用户
# 同时在线 500~1000 用户
# 后台接口型业务完全无压力

 

# 门户 HTTP 压测 — 修正版配置
target: "http://106.12.210.3"  # 只写 IP/域名，不要带接口路径

timezone: "Asia/Shanghai"

windows:
  - { start: "09:00", end: "12:00" }
  - { start: "14:00", end: "17:00" }
  - { start: "20:00", end: "22:59" }

# 先稳定跑通！不要一上来 500 QPS
qps_min: 100
qps_max: 300

concurrency: 50        # 小并发先跑通
request_timeout: 8s

# 正确写法：只填你要压的后端接口
extra_paths:
  - /api/public/web/stats